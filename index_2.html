*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0a0f1e;color:#f1f5f9;min-height:100vh}
#root{width:100%;min-height:100vh}
.land{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:32px 20px;gap:40px}
.land-brand{font-size:36px;font-weight:700;text-align:center;letter-spacing:-1px}
.land-tagline{font-size:15px;color:#64748b;text-align:center;line-height:1.6;max-width:300px}
.land-actions{width:100%;max-width:340px;display:flex;flex-direction:column;gap:12px}
.btn-primary{width:100%;padding:16px;border-radius:14px;border:none;font-size:16px;font-weight:600;cursor:pointer;background:linear-gradient(135deg,#3b82f6,#1d4ed8);color:#fff}
.btn-ghost{flex:1;padding:13px;border-radius:10px;border:1px solid #1e293b;background:none;color:#64748b;font-size:14px;cursor:pointer}
.sep{display:flex;align-items:center;gap:12px;color:#334155;font-size:13px}
.sep::before,.sep::after{content:'';flex:1;height:1px;background:#1e293b}
.join-row{display:flex;gap:8px;width:100%}
.code-input{flex:1;background:#1e293b;border:1px solid #334155;border-radius:10px;padding:12px 14px;font-size:16px;color:#f1f5f9;outline:none;letter-spacing:3px;text-transform:uppercase;font-weight:700}
.code-input:focus{border-color:#3b82f6}
.join-btn{background:#3b82f6;border:none;color:#fff;padding:12px 18px;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:flex-end;justify-content:center;z-index:100}
.sheet{background:#0f172a;border-radius:20px 20px 0 0;padding:28px 20px 48px;width:100%;max-width:480px}
.sheet-handle{width:36px;height:4px;background:#1e293b;border-radius:2px;margin:0 auto 20px}
.sheet h2{font-size:20px;font-weight:600;margin-bottom:6px}
.sheet p{font-size:13px;color:#64748b;margin-bottom:20px;line-height:1.6}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;color:#64748b;margin-bottom:6px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.field input{width:100%;background:#1e293b;border:1px solid #334155;border-radius:10px;padding:12px 14px;font-size:15px;color:#f1f5f9;outline:none}
.field input:focus{border-color:#3b82f6}
.sheet-actions{display:flex;gap:10px;margin-top:8px}
.err{color:#ef4444;font-size:13px;margin-bottom:10px}
.join-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:32px 20px;gap:24px}
.room-badge{background:#1e293b;border-radius:16px;padding:20px 24px;text-align:center;width:100%;max-width:340px}
.room-badge-lbl{font-size:11px;color:#64748b;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.room-badge-name{font-size:22px;font-weight:600}
.room-badge-code{font-size:13px;color:#475569;margin-top:4px;letter-spacing:2px}
.mpills{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;max-width:340px}
.mpill{font-size:12px;padding:4px 12px;border-radius:20px;color:#fff;font-weight:500}
.app{display:flex;flex-direction:column;height:100vh;max-height:100dvh;background:#0f172a;position:relative;max-width:480px;margin:0 auto;width:100%}
.header{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.hsub{font-size:11px;opacity:.7}
.hname{font-size:17px;font-weight:500}
.hright{display:flex;gap:8px;align-items:center}
.bsm{background:rgba(255,255,255,.18);border:none;color:#fff;padding:6px 12px;border-radius:20px;font-size:12px;cursor:pointer}
.sdot{width:8px;height:8px;border-radius:50%;background:#22c55e;opacity:0;transition:opacity .4s;flex-shrink:0}
.sdot.on{opacity:1}
.room-bar{display:flex;align-items:center;gap:8px;padding:0 16px 8px;flex-shrink:0;overflow-x:auto}
.room-bar::-webkit-scrollbar{display:none}
.rcode{font-size:10px;background:#1e293b;color:#64748b;padding:3px 10px;border-radius:20px;letter-spacing:1.5px;font-weight:700;flex-shrink:0;cursor:pointer}
.mdot{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;flex-shrink:0;border:2px solid #0f172a}
.content{flex:1;overflow:hidden;display:flex;flex-direction:column;min-height:0}
.scroll{flex:1;overflow-y:auto;padding:10px 12px;display:flex;flex-direction:column;gap:8px;min-height:0}
.bnav{display:flex;border-top:1px solid rgba(255,255,255,.06);background:#0f172a;flex-shrink:0;padding-bottom:env(safe-area-inset-bottom)}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 2px;gap:2px;background:none;border:none;color:#475569;cursor:pointer;position:relative;font-size:9px}
.nb.on{color:#f1f5f9}
.ni{font-size:19px}
.bdg{position:absolute;top:4px;right:12%;background:#ef4444;color:#fff;font-size:9px;border-radius:50%;width:15px;height:15px;display:flex;align-items:center;justify-content:center;font-weight:700}
.card{background:#1e293b;border-radius:12px;padding:12px;display:flex;align-items:center;gap:10px}
.cflag{font-size:22px;flex-shrink:0}
.cinfo{flex:1;min-width:0}
.cid{font-weight:500;font-size:13px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.cnm{font-size:11px;color:#94a3b8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.fb{font-size:9px;background:rgba(250,204,21,.15);color:#fbbf24;padding:1px 5px;border-radius:4px}
.qbadge{font-size:9px;background:rgba(255,255,255,.08);color:#94a3b8;padding:1px 5px;border-radius:4px}
.otag{font-size:10px;padding:2px 8px;border-radius:10px;color:#fff;margin-top:4px;display:inline-block;font-weight:500}
.cbtn{flex-shrink:0;padding:8px 12px;border-radius:10px;border:none;font-size:11px;font-weight:600;cursor:pointer}
.cbtn.u{background:#1e3a5f;color:#93c5fd}
.cbtn.c{background:#14532d;color:#86efac}
.chips{display:flex;gap:6px;padding:6px 12px;overflow-x:auto;flex-shrink:0}
.chips::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:4px 12px;border-radius:16px;font-size:11px;border:none;cursor:pointer;background:#1e293b;color:#64748b;font-weight:500}
.chip.on{background:#f1f5f9;color:#0f172a}
.sw{padding:8px 12px 4px;flex-shrink:0}
.si{width:100%;background:#1e293b;border:none;border-radius:10px;padding:9px 12px;font-size:13px;color:#f1f5f9;outline:none;direction:ltr}
.si::placeholder{color:#475569}
.mc{background:#1e293b;border-radius:12px;padding:12px}
.mh{display:flex;align-items:center;gap:10px}
.qc{display:flex;align-items:center;gap:8px;flex-shrink:0}
.qbtn{width:30px;height:30px;border-radius:50%;background:#334155;border:none;color:#e2e8f0;cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.qv{font-weight:600;min-width:22px;text-align:center;font-size:15px}
.cr{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
.cc{font-size:10px;padding:2px 8px;border-radius:10px;color:#fff;font-weight:500}
.pcard{background:#1e293b;border-radius:12px;padding:12px}
.prow{display:flex;align-items:center;gap:8px;margin-top:10px}
.pname{flex:1;font-size:12px;padding:5px 10px;border-radius:10px;color:#fff;font-weight:500}
.gb{background:#14532d;color:#86efac;border:none;font-size:11px;padding:7px 12px;border-radius:8px;cursor:pointer;font-weight:600;flex-shrink:0}
.gs{background:#1e293b;color:#475569;border:none;font-size:11px;padding:7px 12px;border-radius:8px;cursor:pointer;flex-shrink:0}
.modal{position:fixed;inset:0;background:#0f172a;display:flex;flex-direction:column;z-index:10;max-width:480px;margin:0 auto}
.modh{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid rgba(255,255,255,.06);flex-shrink:0}
.modx{background:none;border:none;color:#64748b;font-size:22px;cursor:pointer;width:32px;height:32px;display:flex;align-items:center;justify-content:center;flex-shrink:0}

.mods::placeholder{color:#475569}

.mii{flex:1;min-width:0}
.miid{font-weight:500;font-size:13px}
.minm{font-size:11px;color:#475569;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ar{display:flex;align-items:center;gap:6px;flex-shrink:0}
.empty{text-align:center;color:#334155;padding:48px 20px;font-size:13px;line-height:2.2}
.sec-label{font-size:10px;color:#475569;font-weight:700;text-transform:uppercase;letter-spacing:.8px;padding:4px 0 2px}
.ls{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:12px;color:#334155;font-size:14px}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#22c55e;color:#fff;padding:8px 18px;border-radius:20px;font-size:13px;font-weight:500;opacity:0;transition:opacity .3s;pointer-events:none;z-index:200;white-space:nowrap}
.toast.on{opacity:1}

// Firebase — body sonunda yüklendiği için burada kullanılabilir
var db=null;
var roomUnsub=null;

function initFirebase(){
  try{
    firebase.initializeApp(FIREBASE_CONFIG);
    db=firebase.database();
    return true;
  }catch(e){
    console.error('Firebase init error:',e);
    return false;
  }
}

function subscribeRoom(roomId,cb){
  if(roomUnsub)roomUnsub();
  var ref=db.ref('rooms/'+roomId);
  ref.on('value',function(snap){cb(snap.val());});
  roomUnsub=function(){ref.off();};
}
function saveRoom(roomId,data){
  db.ref('rooms/'+roomId).set(data).catch(console.error);
}
function getRoom(roomId){
  return db.ref('rooms/'+roomId).once('value').then(function(snap){return snap.val();});
}

var params=new URLSearchParams(location.search);
var S={
  screen:'landing',
  roomId:params.get('room')||null,
  roomData:null,user:null,
  tab:'market',tf:'ALL',srch:'',
  modal:false,ms:'',
  overlay:null,
  nameInput:'',roomNameInput:'',
  error:'',loading:false
};

function mut(fn){
  if(!S.roomData)return;
  S.roomData=fn(JSON.parse(JSON.stringify(S.roomData)));
  saveRoom(S.roomId,S.roomData);
  flashSave();
}
function getColor(name){return uColor(name,S.roomData?S.roomData.members:{});}

function init(){
  if(!initFirebase()){
    g('root').innerHTML='<div class="ls"><div style="font-size:48px">⚠️</div><div style="color:#ef4444">Firebase yüklenemedi.<br>Sayfayı yenileyin.</div></div>';
    return;
  }
  if(S.roomId){
    var saved=localStorage.getItem('takas_user_'+S.roomId);
    if(saved){
      getRoom(S.roomId).then(function(data){
        if(data&&data.members&&data.members[saved]){
          S.user=saved;S.roomData=data;S.screen='app';
          subscribeRoom(S.roomId,function(d){if(d){S.roomData=d;}render();});
          render();
        } else {
          localStorage.removeItem('takas_user_'+S.roomId);
          loadJoinScreen();
        }
      });
      return;
    }
    loadJoinScreen();
    return;
  }
  render();
}

function loadJoinScreen(){
  getRoom(S.roomId).then(function(data){
    if(!data){S.screen='landing';S.roomId=null;S.error='Oda bulunamadı.';render();return;}
    S.roomData=data;S.screen='joining';render();
  });
}

function render(){
  var root=g('root');
  if(S.screen==='landing'){root.innerHTML=rLanding();aLanding();}
  else if(S.screen==='joining'){root.innerHTML=rJoining();aJoining();}
  else if(S.screen==='app'){root.innerHTML=rApp();aApp();}
}

function aLanding(){
  g('createBtn')&&(g('createBtn').onclick=function(){S.overlay='create';S.error='';render();setTimeout(function(){g('nameI')&&g('nameI').focus();},80);});
  g('joinBtn')&&(g('joinBtn').onclick=function(){
    var code=(g('codeInp').value||'').trim().toUpperCase();
    if(code.length!==6){S.error='6 haneli kodu gir';render();return;}
    history.pushState({},'','?room='+code);
    S.roomId=code;S.screen='joining';S.error='';
    loadJoinScreen();
  });
  g('codeInp')&&(g('codeInp').oninput=function(e){g('codeInp').value=e.target.value.toUpperCase();});
  g('codeInp')&&(g('codeInp').onkeydown=function(e){if(e.key==='Enter')g('joinBtn').click();});
  g('ov')&&(g('ov').onclick=function(e){if(e.target===g('ov')){S.overlay=null;render();}});
  g('cancelBtn')&&(g('cancelBtn').onclick=function(){S.overlay=null;S.error='';render();});
  g('nameI')&&(g('nameI').oninput=function(e){S.nameInput=e.target.value;});
  g('rnameI')&&(g('rnameI').oninput=function(e){S.roomNameInput=e.target.value;});
  g('confirmBtn')&&(g('confirmBtn').onclick=function(){
    var name=S.nameInput.trim();
    if(!name){S.error='İsim gerekli';render();setTimeout(function(){g('nameI')&&g('nameI').focus();},50);return;}
    S.loading=true;S.error='';render();
    var roomId=genId();
    var data={name:(S.roomNameInput.trim()||name+"'in Odası"),createdBy:name,createdAt:Date.now(),members:{},duplicates:{},claims:{},trades:{}};
    data.members[name]=Date.now();
    db.ref('rooms/'+roomId).set(data).then(function(){
      localStorage.setItem('takas_user_'+roomId,name);
      S.roomId=roomId;S.roomData=data;S.user=name;
      S.screen='app';S.overlay=null;S.loading=false;S.nameInput='';S.roomNameInput='';
      history.pushState({},'','?room='+roomId);
      subscribeRoom(roomId,function(d){if(d){S.roomData=d;}render();});
      render();
    }).catch(function(e){S.error='Hata: '+e.message;S.loading=false;render();});
  });
}

function aJoining(){
  setTimeout(function(){g('joinNameI')&&g('joinNameI').focus();},100);
  g('joinNameI')&&(g('joinNameI').onkeydown=function(e){if(e.key==='Enter')g('joinRoomBtn')&&g('joinRoomBtn').click();});
  g('joinRoomBtn')&&(g('joinRoomBtn').onclick=function(){
    var name=(g('joinNameI').value||'').trim();
    if(!name){S.error='İsim gerekli';render();return;}
    var existing=S.roomData?S.roomData.members:{};
    if(existing[name]){S.error='Bu isim kullanımda';render();return;}
    S.loading=true;S.error='';render();
    db.ref('rooms/'+S.roomId+'/members/'+name).set(Date.now()).then(function(){
      localStorage.setItem('takas_user_'+S.roomId,name);
      S.user=name;S.loading=false;
      return getRoom(S.roomId);
    }).then(function(fresh){
      S.roomData=fresh;S.screen='app';
      subscribeRoom(S.roomId,function(d){if(d){S.roomData=d;}render();});
      render();
    }).catch(function(e){S.error='Hata: '+e.message;S.loading=false;render();});
  });
}

// APP
function cntClaims(){
  var claims=S.roomData?S.roomData.claims:{};
  return Object.keys(claims).filter(function(k){var p=k.split('::');return p[1]===S.user&&(claims[k]||[]).length>0;}).length;
}
function cntTrades(){
  var trades=S.roomData?S.roomData.trades:{};
  return Object.values(trades).filter(function(t){return t.to===S.user&&t.status==='sent';}).length;
}

function rApp(){
  var n1=cntClaims(),n2=cntTrades();
  var members=S.roomData?S.roomData.members:{};
  var dots=Object.keys(members).map(function(n){return '<div class="mdot" style="background:'+getColor(n)+'" title="'+n+'">'+initials(n)+'</div>';}).join('');
  var tabs=[{id:'market',ic:'🏪',lb:'Pazar'},{id:'mine',ic:'📦',lb:'Fazlalık'},{id:'claims',ic:'🔔',lb:'Talepler',bd:n1},{id:'trades',ic:'🤝',lb:'Takaslar',bd:n2}];
  var navHtml=tabs.map(function(t){return '<button class="nb'+(S.tab===t.id?' on':'')+'" data-tab="'+t.id+'"><span class="ni">'+t.ic+'</span><span>'+t.lb+'</span>'+((t.bd||0)>0?'<span class="bdg">'+t.bd+'</span>':'')+'</button>';}).join('');

  if(S.tab==='market')content=rMarket();
  else if(S.tab==='mine')content=rMine();

}

function getMktItems(){
  var d=S.roomData,u=S.user,items=[];
  if(!d||!d.duplicates)return items;
  Object.keys(d.duplicates).forEach(function(owner){
    if(owner===u)return;
    var st=d.duplicates[owner];
    Object.keys(st).forEach(function(sid){
      var qty=st[sid];if(qty<=0)return;
      var s=SM[sid];if(!s)return;
      var key=sid+'::'+owner;
      var cl=(d.claims&&d.claims[key])||[];
      items.push({owner:owner,sid:sid,qty:qty,s:s,claimed:cl.indexOf(u)>-1,cc:cl.length});
    });
  });
  return items;
}
function rMktList(){
  var items=getMktItems();
  var f=items.filter(function(i){
    if(S.tf!=='ALL'&&i.s.tc!==S.tf)return false;
    if(S.srch){var q=S.srch.toLowerCase();return i.sid.toLowerCase().indexOf(q)>-1||i.s.nm.toLowerCase().indexOf(q)>-1;}
    return true;
  });
  if(!f.length)return '<div class="empty">'+(items.length?'Sonuç bulunamadı':'Henüz kimse fazlalık eklemedi 🎴<br>Fazlalık sekmesinden ekle')+'</div>';
  return f.map(function(i){return '<div class="card"><div class="cflag">'+(TF[i.s.tc]||'🎴')+'</div><div class="cinfo"><div class="cid">'+i.sid+(i.s.f?'<span class="fb">✨FOIL</span>':'')+(i.qty>1?'<span class="qbadge">x'+i.qty+'</span>':'')+'</div><div class="cnm">'+i.s.nm+'</div><span class="otag" style="background:'+getColor(i.owner)+'">'+i.owner+(i.cc>0?' · '+i.cc+' talep':'')+'</span></div><button class="cbtn '+(i.claimed?'c':'u')+'" data-cl="'+i.sid+'" data-ow="'+i.owner+'">'+(i.claimed?'✓ Talep':'İstiyorum')+'</button></div>';}).join('');
}
function rMarket(){
  var items=getMktItems();
  var tw=['ALL'];AT.forEach(function(t){if(items.some(function(i){return i.s.tc===t;}))tw.push(t);});
  var chips=tw.map(function(t){return '<button class="chip'+(S.tf===t?' on':'')+'" data-tf="'+t+'">'+(t==='ALL'?'Tümü':(TF[t]||'')+t)+'</button>';}).join('');
  return '<div class="sw"><input class="si" id="srchI" placeholder="Ara... (BRA14, Messi, TUR...)" value="'+S.srch+'"></div><div class="chips">'+chips+'</div><div class="scroll" id="mktL">'+rMktList()+'</div>';
}

function rMine(){
  var d=S.roomData,u=S.user,mine=(d&&d.duplicates&&d.duplicates[u])||{};
  var items=Object.keys(mine).filter(function(sid){return mine[sid]>0;}).map(function(sid){
    var s=SM[sid];if(!s)return null;
    var cl=((d.claims&&d.claims[sid+'::'+u])||[]).slice().sort(function(a,b){return ((d.received&&d.received[a])||0)-((d.received&&d.received[b])||0);});
    return{sid:sid,qty:mine[sid],s:s,cl:cl};
  }).filter(Boolean);
  var list=items.length?items.map(function(i){
    var clHtml=i.cl.length?'<div class="cr">'+i.cl.map(function(c,idx){return '<span class="cc" style="background:'+getColor(c)+'">'+(idx===0?'👑 ':'')+c+'</span>';}).join('')+'</div>':'';
    return '<div class="mc"><div class="mh"><div class="cflag">'+(TF[i.s.tc]||'🎴')+'</div><div style="flex:1;min-width:0"><div class="cid">'+i.sid+(i.s.f?'<span class="fb">✨FOIL</span>':'')+'</div><div class="cnm">'+i.s.nm+'</div></div><div class="qc"><button class="qbtn" data-qm="'+i.sid+'">−</button><span class="qv">'+i.qty+'</span><button class="qbtn" data-qp="'+i.sid+'">+</button></div></div>'+clHtml+'</div>';
  }).join(''):'<div class="empty">Henüz mükerrer eklemediniz 📦<br>+ Ekle butonuna basın</div>';
  return '<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 12px 4px;flex-shrink:0"><span style="font-size:12px;color:#64748b">'+items.length+' mükerrer</span><button id="addBtn" style="background:#f1f5f9;color:#0f172a;border:none;padding:8px 16px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer">+ Ekle</button></div><div class="scroll">'+list+'</div>';
}

function rClaims(){
  var d=S.roomData,u=S.user;
  var claims=d?d.claims:{};
  var items=Object.keys(claims).filter(function(k){var p=k.split('::');return p[1]===u&&(claims[k]||[]).length>0;}).map(function(k){
    var sid=k.split('::')[0];var s=SM[sid];if(!s)return null;
    var qty=(d.duplicates&&d.duplicates[u]&&d.duplicates[u][sid])||0;
    var cl=claims[k].slice().sort(function(a,b){return ((d.received&&d.received[a])||0)-((d.received&&d.received[b])||0);});
    return{sid:sid,s:s,qty:qty,cl:cl};
  }).filter(Boolean);
  if(!items.length)return '<div class="scroll"><div class="empty">Şu an talep yok 🔔<br>Birisi fazlalığını istediğinde burada görünür</div></div>';
  var html=items.map(function(i){
    var rows=i.cl.map(function(c,idx){return '<div class="prow"><span style="font-size:14px">'+(idx===0?'👑':(idx+1)+'.')+'</span><span class="pname" style="background:'+getColor(c)+'">'+c+'</span><span style="font-size:11px;color:#475569">'+((d.received&&d.received[c])||0)+' aldı</span><button class="gb" data-send-sid="'+i.sid+'" data-send-to="'+c+'">Gönder ✓</button></div>';}).join('');
    return '<div class="pcard"><div class="mh"><div class="cflag">'+(TF[i.s.tc]||'🎴')+'</div><div style="flex:1"><div class="cid">'+i.sid+(i.s.f?'<span class="fb">✨FOIL</span>':'')+'</div><div class="cnm">'+i.s.nm+' · <span style="color:#64748b">sende '+i.qty+' adet</span></div></div></div><div style="margin-top:10px;display:flex;flex-direction:column;gap:6px">'+rows+'</div></div>';
  }).join('');
  return '<div class="scroll">'+html+'</div>';
}

function rTrades(){
  var d=S.roomData,u=S.user;
  var trades=d?d.trades:{};
  var all=Object.keys(trades).map(function(id){var t=trades[id];t._id=id;return t;}).filter(function(t){return t.from===u||t.to===u;});
  var pending=all.filter(function(t){return t.status==='sent';});
  var done=all.filter(function(t){return t.status==='done';}).reverse().slice(0,30);
  if(!pending.length&&!done.length)return '<div class="scroll"><div class="empty">Henüz takas yok 🤝<br>Talepler sekmesinden Gönder bas</div></div>';
  var html='';
  if(pending.length){
    html+='<div class="sec-label">📬 Teslim Bekleyenler</div>';
    html+=pending.map(function(t){
      var s=SM[t.sid];var iAmR=t.to===u;
      var otherName=iAmR?t.from:t.to;
      var btn=iAmR?'<button class="gb" data-confirm="'+t._id+'">Teslim Aldım ✓</button>':'<span style="font-size:11px;color:#475569;flex-shrink:0">Onay bekleniyor</span>';
      return '<div class="pcard"><div class="mh"><div class="cflag">'+(TF[s?s.tc:'FWC']||'🎴')+'</div><div style="flex:1"><div class="cid">'+(t.sid||'')+(s&&s.f?'<span class="fb">✨FOIL</span>':'')+'</div><div class="cnm">'+(s?s.nm:'')+'</div></div></div><div class="prow" style="margin-top:10px"><span style="font-size:18px">'+(iAmR?'📥':'📤')+'</span><span class="pname" style="background:'+getColor(otherName)+'">'+otherName+'</span>'+btn+'</div></div>';
    }).join('');
  }
  if(done.length){
    html+='<div class="sec-label" style="margin-top:8px">✅ Tamamlanan Takaslar</div>';
    html+=done.filter(function(t){return t.from===u||t.to===u;}).map(function(t){
      var s=SM[t.sid];var gave=t.from===u;
      return '<div class="card" style="opacity:.65"><div class="cflag">'+(TF[s?s.tc:'FWC']||'🎴')+'</div><div class="cinfo"><div class="cid">'+(t.sid||'')+(s&&s.f?'<span class="fb">✨FOIL</span>':'')+'</div><div class="cnm">'+(s?s.nm:'')+'</div><span class="otag" style="background:'+getColor(gave?t.to:t.from)+'">'+(gave?'→ '+t.to:'← '+t.from)+'</span></div><span style="font-size:20px">'+(gave?'📤':'📥')+'</span></div>';
    }).join('');
  }
  return '<div class="scroll">'+html+'</div>';
}

function rModalItems(){
  var mine=(S.roomData&&S.roomData.duplicates&&S.roomData.duplicates[S.user])||{};
  var q=S.ms.toLowerCase();
  var f=q?ALL.filter(function(s){return s.id.toLowerCase().indexOf(q)>-1||s.nm.toLowerCase().indexOf(q)>-1;}).slice(0,80):ALL.slice(0,80);
  return f.map(function(s){var qty=mine[s.id]||0;return '<div class="mi"><span style="font-size:20px;flex-shrink:0">'+(TF[s.tc]||'🎴')+'</span><div class="mii"><div class="miid">'+s.id+(s.f?' ✨':'')+'</div><div class="minm">'+s.nm+'</div></div><div class="ar">'+(qty>0?'<button class="qbtn" data-mm="'+s.id+'">−</button><span class="qv" style="color:#f1f5f9">'+qty+'</span>':'')+'<button class="qbtn" style="background:#3b82f6;color:#fff" data-mp="'+s.id+'">+</button></div></div>';}).join('');
}
function rModal(){
  return '<div class="modal"><div class="modh"><button class="modx" id="mClose">✕</button><input class="mods" id="mSrch" placeholder="Ara... (TUR14, Arda, BRA...)" value="'+S.ms+'"></div><div class="scroll" id="mList">'+rModalItems()+'</div></div>';
}

function aMkt(){
  document.querySelectorAll('[data-cl]').forEach(function(b){b.onclick=function(){
    var sid=b.dataset.cl,owner=b.dataset.ow,u=S.user;
    mut(function(d){
      var key=sid+'::'+owner;
      if(!d.claims)d.claims={};
      var prev=d.claims[key]||[];
      var idx=prev.indexOf(u);
      if(idx>-1)prev.splice(idx,1);else prev.push(u);
      d.claims[key]=prev;
      return d;
    });
    var ml=g('mktL');if(ml){ml.innerHTML=rMktList();aMkt();}
  };});
}
function aMoItems(){
  document.querySelectorAll('[data-mp]').forEach(function(b){b.onclick=function(){
    var sid=b.dataset.mp,u=S.user;
    mut(function(d){
      if(!d.duplicates)d.duplicates={};
      if(!d.duplicates[u])d.duplicates[u]={};
      d.duplicates[u][sid]=(d.duplicates[u][sid]||0)+1;
      return d;
    });
    var ml=g('mList');if(ml){ml.innerHTML=rModalItems();aMoItems();}
  };});
  document.querySelectorAll('[data-mm]').forEach(function(b){b.onclick=function(){
    var sid=b.dataset.mm,u=S.user;
    mut(function(d){
      if(!d.duplicates||!d.duplicates[u])return d;
      var nq=(d.duplicates[u][sid]||1)-1;
      if(nq<=0){delete d.duplicates[u][sid];if(d.claims&&d.claims[sid+'::'+u])delete d.claims[sid+'::'+u];}
      else d.duplicates[u][sid]=nq;
      return d;
    });
    var ml=g('mList');if(ml){ml.innerHTML=rModalItems();aMoItems();}
  };});
}

function aApp(){
  var roomLink=location.origin+location.pathname+'?room='+S.roomId;
  g('outBtn')&&(g('outBtn').onclick=function(){
    if(confirm('Odadan çıkmak istiyor musun?')){
      localStorage.removeItem('takas_user_'+S.roomId);
      if(roomUnsub)roomUnsub();
      S.user=null;S.screen='landing';S.roomId=null;S.roomData=null;
      history.pushState({},'',location.pathname);render();
    }
  });
  g('shareBtn')&&(g('shareBtn').onclick=function(){
    if(navigator.share){navigator.share({title:'Takas Odası',text:(S.roomData?S.roomData.name:'Takas')+' — katıl!',url:roomLink});}
    else{navigator.clipboard.writeText(roomLink).then(function(){showToast('📋 Oda linki kopyalandı!');});}
  });
  g('codeBtn')&&(g('codeBtn').onclick=function(){navigator.clipboard.writeText(roomLink).then(function(){showToast('📋 Link kopyalandı!');});});
  document.querySelectorAll('[data-tab]').forEach(function(b){b.onclick=function(){S.tab=b.dataset.tab;S.srch='';S.tf='ALL';render();};});
  g('srchI')&&(g('srchI').oninput=function(e){S.srch=e.target.value;var ml=g('mktL');if(ml){ml.innerHTML=rMktList();aMkt();}});
  document.querySelectorAll('[data-tf]').forEach(function(b){b.onclick=function(){S.tf=b.dataset.tf;var ml=g('mktL');if(ml){ml.innerHTML=rMktList();aMkt();}};});
  aMkt();
  g('addBtn')&&(g('addBtn').onclick=function(){S.modal=true;S.ms='';render();setTimeout(function(){g('mSrch')&&g('mSrch').focus();},80);});
  document.querySelectorAll('[data-qm]').forEach(function(b){b.onclick=function(){
    var sid=b.dataset.qm,u=S.user;
    mut(function(d){if(!d.duplicates||!d.duplicates[u])return d;var nq=(d.duplicates[u][sid]||1)-1;if(nq<=0){delete d.duplicates[u][sid];if(d.claims&&d.claims[sid+'::'+u])delete d.claims[sid+'::'+u];}else d.duplicates[u][sid]=nq;return d;});
    render();
  };});
  document.querySelectorAll('[data-qp]').forEach(function(b){b.onclick=function(){
    var sid=b.dataset.qp,u=S.user;
    mut(function(d){if(!d.duplicates)d.duplicates={};if(!d.duplicates[u])d.duplicates[u]={};d.duplicates[u][sid]=(d.duplicates[u][sid]||0)+1;return d;});
    render();
  };});
  // Gönder butonu (veren taraf)
  document.querySelectorAll('[data-send-sid]').forEach(function(b){b.onclick=function(){
    var sid=b.dataset.sendSid,to=b.dataset.sendTo,u=S.user;
    mut(function(d){
      if(d.duplicates&&d.duplicates[u]&&d.duplicates[u][sid]){
        var nq=d.duplicates[u][sid]-1;
        if(nq<=0)delete d.duplicates[u][sid];else d.duplicates[u][sid]=nq;
      }
      var ck=sid+'::'+u;
      if(d.claims&&d.claims[ck]){
        var idx=d.claims[ck].indexOf(to);
        if(idx>-1)d.claims[ck].splice(idx,1);
        if(d.claims[ck].length===0)delete d.claims[ck];
      }
      if(!d.trades)d.trades={};
      d.trades['t'+Date.now()]={sid:sid,from:u,to:to,status:'sent',sentAt:Date.now()};
      return d;
    });
    showToast('📤 Gönderildi! '+to+' onaylamasını bekle.');
    render();
  };});
  // Teslim Aldım butonu (alan taraf)
  document.querySelectorAll('[data-confirm]').forEach(function(b){b.onclick=function(){
    var tid=b.dataset.confirm,u=S.user;
    mut(function(d){
      if(!d.trades||!d.trades[tid])return d;
      d.trades[tid].status='done';
      d.trades[tid].doneAt=Date.now();
      if(!d.received)d.received={};
      d.received[u]=(d.received[u]||0)+1;
      return d;
    });
    showToast('✅ Takas tamamlandı!');
    render();
  };});
  g('mClose')&&(g('mClose').onclick=function(){S.modal=false;S.ms='';render();});
  g('mSrch')&&(g('mSrch').oninput=function(e){S.ms=e.target.value;var ml=g('mList');if(ml){ml.innerHTML=rModalItems();aMoItems();}});
  aMoItems();
}

window.addEventListener('DOMContentLoaded',init);
</script>
</body>
</html>
