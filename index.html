.code-input{flex:1;background:#1e293b;border:1px solid #334155;border-radius:10px;padding:12px 14px;font-size:16px;color:#f1f5f9;outline:none;letter-spacing:3px;text-transform:uppercase;font-weight:700}
.code-input:focus{border-color:#3b82f6}
.join-btn{background:#3b82f6;border:none;color:#fff;padding:12px 18px;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:flex-end;justify-content:center;z-index:100}

.sheet-handle{width:36px;height:4px;background:#1e293b;border-radius:2px;margin:0 auto 20px}
.sheet h2{font-size:20px;font-weight:600;margin-bottom:6px}
.sheet p{font-size:13px;color:#64748b;margin-bottom:20px;line-height:1.6}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;color:#64748b;margin-bottom:6px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}

.field input:focus{border-color:#3b82f6}
.sheet-actions{display:flex;gap:10px;margin-top:8px}
.err{color:#ef4444;font-size:13px;margin-bottom:10px}

.mpill{font-size:12px;padding:4px 12px;border-radius:20px;color:#fff;font-weight:500}
.app{display:flex;flex-direction:column;height:100vh;max-height:100dvh;background:#0f172a;position:relative;max-width:480px;margin:0 auto;width:100%}

const ALL=(()=>RAW.trim().split('\n').map(l=>{
  const f=l.includes(' FOIL');
  const c=l.replace(/ FOIL$/,'').trim();
  const sp=c.indexOf(' ');if(sp<0)return null;
  const id=c.slice(0,sp),nm=c.slice(sp+1).trim();
  const m=id.match(/^([A-Za-z]+)/);
  let tc=m?m[1].toUpperCase():'FWC';tc=NRM[tc]||tc;
  return{id,nm,f,tc};
}).filter(Boolean))();
const SM=Object.fromEntries(ALL.map(s=>[s.id,s]));
const AT=[...new Set(ALL.map(s=>s.tc))];

// ── Yardımcılar ──
function genId(){
  const ch='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  return Array.from({length:6},()=>ch[Math.floor(Math.random()*ch.length)]).join('');
}
function uColor(name,members){
  const idx=Object.keys(members||{}).sort().indexOf(name);
  return PALETTE[Math.max(0,idx)%PALETTE.length];
}
function initials(n){return(n||'?').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();}
const g=id=>document.getElementById(id);
function showToast(msg,ok=true){
  const t=g('toast');if(!t)return;
  t.textContent=msg;
  t.style.background=ok?'#22c55e':'#ef4444';
  t.classList.add('on');
  setTimeout(()=>t.classList.remove('on'),2500);
}
function flashSave(){const d=g('sd');if(d){d.classList.add('on');setTimeout(()=>d.classList.remove('on'),1500);}}

// ── Firebase ──
firebase.initializeApp(FIREBASE_CONFIG);
const db=firebase.database();

let roomUnsub=null;
function subscribeRoom(roomId,cb){
  if(roomUnsub)roomUnsub();
  const ref=db.ref('rooms/'+roomId);
  ref.on('value',snap=>cb(snap.val()));
  roomUnsub=()=>ref.off();
}
function saveRoom(roomId,data){
  db.ref('rooms/'+roomId).set(data).catch(console.error);
}
async function getRoom(roomId){
  const snap=await db.ref('rooms/'+roomId).once('value');
  return snap.val();
}

// ── State ──
const params=new URLSearchParams(location.search);
let S={
  screen:'landing',
  roomId:params.get('room')||null,
  roomData:null,
  user:null,
  tab:'market',tf:'ALL',srch:'',
  modal:false,ms:'',
  overlay:null,
  nameInput:'',roomNameInput:'',
  error:'',loading:false
};

function mut(fn){
  if(!S.roomData)return;
  S.roomData=fn(JSON.parse(JSON.stringify(S.roomData)));
  saveRoom(S.roomId,S.roomData);
  flashSave();
}
function getColor(name){return uColor(name,S.roomData?.members||{});}

// ── Init ──
async function init(){
  if(S.roomId){
    const saved=localStorage.getItem('takas_user_'+S.roomId);
    if(saved){
      const data=await getRoom(S.roomId);
      if(data&&data.members&&data.members[saved]){
        S.user=saved;S.roomData=data;S.screen='app';
        subscribeRoom(S.roomId,d=>{if(d){S.roomData=d;}render();});
        render();return;
      } else {
        localStorage.removeItem('takas_user_'+S.roomId);
      }
    }
    S.screen='joining';
    const data=await getRoom(S.roomId);
    if(!data){S.screen='landing';S.roomId=null;S.error='Oda bulunamadı.';render();return;}
    S.roomData=data;
  }
  render();
}

// ── Render ──
function render(){
  const root=g('root');
  if(S.screen==='landing'){root.innerHTML=rLanding();aLanding();}
  else if(S.screen==='joining'){root.innerHTML=rJoining();aJoining();}
  else if(S.screen==='app'){root.innerHTML=rApp();aApp();}
}

function rLanding(){
  return`<div class="land">
    <div>
      <div class="land-logo">⚽</div>
      <div class="land-brand">Takas</div>
      <div class="land-tagline" style="margin-top:8px">Çıkartma mükerrerlerini arkadaşlarınla kolayca takasla</div>
    </div>
    <div class="land-actions">
      ${S.error?`<div class="err" style="text-align:center">${S.error}</div>`:''}
      <button class="btn-primary" id="createBtn">+ Yeni Oda Oluştur</button>
      <div class="sep">ya da</div>
      <div class="join-row">
        <input class="code-input" id="codeInp" placeholder="Oda kodu" maxlength="6">
        <button class="join-btn" id="joinBtn">Katıl →</button>
      </div>
    </div>
    ${S.overlay==='create'?`<div class="overlay" id="ov">
      <div class="sheet">
        <div class="sheet-handle"></div>
        <h2>Yeni Oda Oluştur</h2>
        <p>Arkadaşlarını davet etmek için bir oda kur.</p>
        <div class="field"><label>Senin adın *</label><input id="nameI" placeholder="Adını gir" maxlength="20" value="${S.nameInput}"></div>
        <div class="field"><label>Oda adı (opsiyonel)</label><input id="rnameI" placeholder="örn. Okul Grubu" maxlength="30" value="${S.roomNameInput}"></div>
        ${S.error?`<div class="err">${S.error}</div>`:''}
        <div class="sheet-actions">
          <button class="btn-ghost" id="cancelBtn">İptal</button>
          <button class="btn-primary" style="flex:2" id="confirmBtn">${S.loading?'Oluşturuluyor...':'Odayı Oluştur'}</button>
        </div>
      </div>
    </div>`:''}
  </div>`;
}
function aLanding(){
  g('createBtn')&&(g('createBtn').onclick=()=>{S.overlay='create';S.error='';render();setTimeout(()=>g('nameI')&&g('nameI').focus(),80);});
  g('joinBtn')&&(g('joinBtn').onclick=()=>{
    const code=(g('codeInp').value||'').trim().toUpperCase();
    if(code.length!==6){S.error='6 haneli kodu gir';render();return;}
    history.pushState({},'','?room='+code);
    S.roomId=code;S.screen='joining';S.error='';
    init();
  });
  g('codeInp')&&(g('codeInp').oninput=e=>{g('codeInp').value=e.target.value.toUpperCase();});
  g('codeInp')&&(g('codeInp').onkeydown=e=>{if(e.key==='Enter')g('joinBtn').click();});
  g('ov')&&(g('ov').onclick=e=>{if(e.target===g('ov')){S.overlay=null;render();}});
  g('cancelBtn')&&(g('cancelBtn').onclick=()=>{S.overlay=null;S.error='';render();});
  g('nameI')&&(g('nameI').oninput=e=>S.nameInput=e.target.value);
  g('rnameI')&&(g('rnameI').oninput=e=>S.roomNameInput=e.target.value);
  g('confirmBtn')&&(g('confirmBtn').onclick=async()=>{
    const name=S.nameInput.trim();
    if(!name){S.error='İsim gerekli';render();setTimeout(()=>g('nameI')&&g('nameI').focus(),50);return;}
    S.loading=true;S.error='';render();
    const roomId=genId();
    const data={
      name:S.roomNameInput.trim()||name+"'in Odası",
      createdBy:name,createdAt:Date.now(),
      members:{[name]:Date.now()},
      duplicates:{},claims:{},trades:{},history:[]
    };
    try{
      await db.ref('rooms/'+roomId).set(data);
      localStorage.setItem('takas_user_'+roomId,name);
      S.roomId=roomId;S.roomData=data;S.user=name;
      S.screen='app';S.overlay=null;S.loading=false;S.nameInput='';S.roomNameInput='';
      history.pushState({},'','?room='+roomId);
      subscribeRoom(roomId,d=>{if(d){S.roomData=d;}render();});
      render();
    }catch(e){S.error='Hata oluştu, tekrar dene.';S.loading=false;render();}
  });
}

// ────────────────────────────────────────
// JOIN SCREEN
// ────────────────────────────────────────

  const members=S.roomData?.members||{};
  return`<div class="join-screen">
    <div style="font-size:48px">⚽</div>
    <div class="room-badge">
      <div class="room-badge-lbl">Odaya davet edildiniz</div>
      <div class="room-badge-name">${S.roomData?.name||'Yükleniyor...'}</div>
      <div class="room-badge-code">${S.roomId}</div>
    </div>
    ${Object.keys(members).length>0?`<div class="mpills">
      ${Object.keys(members).map(n=>`<span class="mpill" style="background:${uColor(n,members)}">${n}</span>`).join('')}
    </div>`:''}
    <div style="width:100%;max-width:340px">
      <div class="field">
        <label style="font-size:11px;color:#64748b;font-weight:600;text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:8px">Adın</label>
        <input class="si" id="joinNameI" placeholder="Adını gir" maxlength="20" style="font-size:16px;border:1px solid #334155;border-radius:12px;padding:14px">
      </div>
      ${S.error?`<div class="err">${S.error}</div>`:''}
      <button class="btn-primary" id="joinRoomBtn" style="margin-top:12px">${S.loading?'Katılınıyor...':'Odaya Katıl →'}</button>
    </div>

}
function aJoining(){
  g('joinNameI')&&(g('joinNameI').onkeydown=e=>{if(e.key==='Enter')g('joinRoomBtn')&&g('joinRoomBtn').click();});
  setTimeout(()=>g('joinNameI')&&g('joinNameI').focus(),100);
  g('joinRoomBtn')&&(g('joinRoomBtn').onclick=async()=>{
    const name=(g('joinNameI').value||'').trim();
    if(!name){S.error='İsim gerekli';render();return;}
    const existing=S.roomData?.members||{};
    if(existing[name]){S.error='Bu isim kullanımda, başka bir isim dene';render();return;}
    S.loading=true;S.error='';render();
    try{
      await db.ref('rooms/'+S.roomId+'/members/'+name).set(Date.now());
      localStorage.setItem('takas_user_'+S.roomId,name);
      S.user=name;S.loading=false;
      const fresh=await getRoom(S.roomId);
      S.roomData=fresh;S.screen='app';
      subscribeRoom(S.roomId,d=>{if(d){S.roomData=d;}render();});
      render();
    }catch(e){S.error='Hata oluştu';S.loading=false;render();}
  });
}

// ────────────────────────────────────────
// APP
// ────────────────────────────────────────
function pendingForMe(){
  // Talepler: benden onay bekleyen (ben vereceğim)
  const claims=S.roomData?.claims||{};
  return Object.keys(claims).filter(k=>{
    const[,owner]=k.split('::');
    return owner===S.user&&(claims[k]||[]).length>0;
  }).length;
}
function tradePendingForMe(){
  // Bekleyenler: bana gönderildi ama ben teslim almadım
  const trades=S.roomData?.trades||{};
  return Object.values(trades).filter(t=>t.to===S.user&&t.status==='sent').length;
}

function rApp(){
  const n1=pendingForMe();
  const n2=tradePendingForMe();
  const members=S.roomData?.members||{};
  return`<div class="app">
    <div class="header" style="background:${getColor(S.user)}">
      <div>
        <div class="hsub">${S.roomData?.name||''}</div>
        <div class="hname">${S.user}</div>
      </div>
      <div class="hright">
        <div class="sdot" id="sd"></div>
        <button class="bsm" id="shareBtn">🔗 Davet</button>
        <button class="bsm" id="outBtn">Çıkış</button>
      </div>
    </div>
    <div class="room-bar">
      <span class="rcode" id="codeBtn">${S.roomId}</span>
      ${Object.keys(members).map(n=>`<div class="mdot" style="background:${getColor(n)}" title="${n}">${initials(n)}</div>`).join('')}
    </div>
    <div class="content">
      ${S.tab==='market'?rMarket():''}
      ${S.tab==='mine'?rMine():''}
      ${S.tab==='claims'?rClaims():''}
      ${S.tab==='trades'?rTrades():''}
    </div>
    <div class="bnav">
      ${[
        {id:'market',ic:'🏪',lb:'Pazar'},
        {id:'mine',ic:'📦',lb:'Fazlalık'},
        {id:'claims',ic:'🔔',lb:'Talepler',bd:n1},
        {id:'trades',ic:'🤝',lb:'Takaslar',bd:n2}
      ].map(t=>`<button class="nb${S.tab===t.id?' on':''}" data-tab="${t.id}">
        <span class="ni">${t.ic}</span><span>${t.lb}</span>
        ${(t.bd||0)>0?`<span class="bdg">${t.bd}</span>`:''}
      </button>`).join('')}
    </div>
    ${S.modal?rModal():''}
  </div>`;
}

// ── PAZAR ──
function getMarketItems(){
  const d=S.roomData,u=S.user,items=[];
  for(const[owner,st]of Object.entries(d.duplicates||{})){
    if(owner===u)continue;
    for(const[sid,qty]of Object.entries(st)){
      if(qty<=0)continue;
      const s=SM[sid];if(!s)continue;
      const key=sid+'::'+owner;
      const cl=d.claims?.[key]||[];
      items.push({owner,sid,qty,s,claimed:cl.includes(u),cc:cl.length});
    }
  }
  return items;
}
function rMarketList(){
  const items=getMarketItems();
  const f=items.filter(i=>{
    if(S.tf!=='ALL'&&i.s.tc!==S.tf)return false;
    if(S.srch){const q=S.srch.toLowerCase();return i.sid.toLowerCase().includes(q)||i.s.nm.toLowerCase().includes(q);}
    return true;
  });
  if(!f.length)return`<div class="empty">${!items.length?'Henüz kimse fazlalık eklemedi 🎴<br>Fazlalık sekmesinden ekle':'Sonuç bulunamadı'}</div>`;
  return f.map(i=>`<div class="card">
    <div class="cflag">${TF[i.s.tc]||'🎴'}</div>
    <div class="cinfo">
      <div class="cid">${i.sid}${i.s.f?'<span class="fb">✨FOIL</span>':''}${i.qty>1?`<span class="qbadge">x${i.qty}</span>`:''}</div>
      <div class="cnm">${i.s.nm}</div>
      <span class="otag" style="background:${getColor(i.owner)}">${i.owner}${i.cc>0?' · '+i.cc+' talep':''}</span>
    </div>
    <button class="cbtn ${i.claimed?'c':'u'}" data-cl="${i.sid}" data-ow="${i.owner}">${i.claimed?'✓ Talep':'İstiyorum'}</button>
  </div>`).join('');
}
function rMarket(){
  const items=getMarketItems();
  const tw=['ALL',...AT.filter(t=>items.some(i=>i.s.tc===t))];
  return`<div class="sw"><input class="si" id="srchI" placeholder="Ara... (BRA14, Messi, TUR...)" value="${S.srch}"></div>
    <div class="chips">${tw.map(t=>`<button class="chip${S.tf===t?' on':''}" data-tf="${t}">${t==='ALL'?'Tümü':(TF[t]||'')+t}</button>`).join('')}</div>
    <div class="scroll" id="mktL">${rMarketList()}</div>`;
}

// ── FAZLALIK ──
function rMine(){
  const d=S.roomData,u=S.user,mine=d.duplicates?.[u]||{};
  const items=Object.entries(mine).filter(([,q])=>q>0).map(([sid,qty])=>{
    const s=SM[sid];if(!s)return null;
    const cl=[...(d.claims?.[sid+'::'+u]||[])].sort((a,b)=>(d.received?.[a]||0)-(d.received?.[b]||0));
    return{sid,qty,s,cl};
  }).filter(Boolean);
  return`<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 12px 4px;flex-shrink:0">
    <span style="font-size:12px;color:#64748b">${items.length} mükerrer</span>
    <button id="addBtn" style="background:#f1f5f9;color:#0f172a;border:none;padding:8px 16px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer">+ Ekle</button>
  </div>
  <div class="scroll">${!items.length?`<div class="empty">Henüz mükerrer eklemediniz 📦<br>+ Ekle butonuna basın</div>`:
    items.map(i=>`<div class="mc">
      <div class="mh">
        <div class="cflag">${TF[i.s.tc]||'🎴'}</div>
        <div style="flex:1;min-width:0">
          <div class="cid">${i.sid}${i.s.f?'<span class="fb">✨FOIL</span>':''}</div>
          <div class="cnm">${i.s.nm}</div>
        </div>
        <div class="qc">
          <button class="qbtn" data-qm="${i.sid}">−</button>
          <span class="qv">${i.qty}</span>
          <button class="qbtn" data-qp="${i.sid}">+</button>
        </div>
      </div>
      ${i.cl.length?`<div class="cr">${i.cl.map((c,idx)=>`<span class="cc" style="background:${getColor(c)}">${idx===0?'👑 ':''}${c}</span>`).join('')}</div>`:''}
    </div>`).join('')}
  </div>`;
}

// ── TALEPLER (benden onay bekleyen) ──
function rClaims(){
  const d=S.roomData,u=S.user;
  const items=Object.entries(d.claims||{}).filter(([k])=>k.endsWith('::'+u)).map(([k,cl])=>{
    const[sid]=k.split('::');const s=SM[sid];if(!s)return null;
    const qty=d.duplicates?.[u]?.[sid]||0;
    const sorted=[...cl].sort((a,b)=>(d.received?.[a]||0)-(d.received?.[b]||0));
    return{sid,s,qty,cl:sorted};
  }).filter(i=>i&&i.cl.length>0);

  return`<div class="scroll">${!items.length?`<div class="empty">Şu an talep yok 🔔<br>Birisi fazlalığını istediğinde burada görünür</div>`:
    items.map(i=>`<div class="pcard">
      <div class="mh">
        <div class="cflag">${TF[i.s.tc]||'🎴'}</div>
        <div style="flex:1">
          <div class="cid">${i.sid}${i.s.f?'<span class="fb">✨FOIL</span>':''}</div>
          <div class="cnm">${i.s.nm} · <span style="color:#64748b">sende ${i.qty} adet</span></div>
        </div>
      </div>
      <div style="margin-top:10px;display:flex;flex-direction:column;gap:6px">
        ${i.cl.map((c,idx)=>`<div class="prow">
          <span style="font-size:14px">${idx===0?'👑':(idx+1)+'.'}</span>
          <span class="pname" style="background:${getColor(c)}">${c}</span>
          <span style="font-size:11px;color:#475569">${d.received?.[c]||0} aldı</span>
          <button class="gb" data-send-sid="${i.sid}" data-send-to="${c}">Gönder ✓</button>
        </div>`).join('')}
      </div>
    </div>`).join('')}
  </div>`;
}

// ── TAKASLAR (bekleyen ve tamamlanan) ──
function rTrades(){
  const d=S.roomData,u=S.user;
  const trades=Object.entries(d.trades||{});
  const myTrades=trades.filter(([,t])=>t.from===u||t.to===u).map(([id,t])=>({id,...t}));
  const pending=myTrades.filter(t=>t.status==='sent');
  const done=myTrades.filter(t=>t.status==='done').reverse().slice(0,30);

  return`<div class="scroll">
    ${pending.length===0&&done.length===0?`<div class="empty">Henüz takas yok 🤝<br>Talepler sekmesinden "Gönder" bas</div>`:''}

    ${pending.length>0?`
      <div class="sec-label">📬 Teslim Bekleyenler</div>
      ${pending.map(t=>{
        const s=SM[t.sid];
        const iAmReceiver=t.to===u;
        return`<div class="pcard">
          <div class="mh">
            <div class="cflag">${TF[s?.tc]||'🎴'}</div>
            <div style="flex:1">
              <div class="cid">${t.sid}${s?.f?'<span class="fb">✨FOIL</span>':''}</div>
              <div class="cnm">${s?.nm||''}</div>
            </div>
          </div>
          <div class="prow" style="margin-top:10px">
            <span style="font-size:18px">${iAmReceiver?'📥':'📤'}</span>
            <span class="pname" style="background:${getColor(iAmReceiver?t.from:t.to)}">${iAmReceiver?t.from:t.to}</span>
            ${iAmReceiver
              ?`<button class="gb" data-confirm="${t.id}">Teslim Aldım ✓</button>`
              :`<span class="status-pill status-wait">Onay bekleniyor</span>`}
          </div>
        </div>`;
      }).join('')}
    `:''}

    ${done.length>0?`
      <div class="sec-label" style="margin-top:8px">✅ Tamamlanan Takaslar</div>
      ${done.filter(t=>t.from===u||t.to===u).map(t=>{
        const s=SM[t.sid];
        const gave=t.from===u;
        return`<div class="card" style="opacity:.65">
          <div class="cflag">${TF[s?.tc]||'🎴'}</div>
          <div class="cinfo">
            <div class="cid">${t.sid}${s?.f?'<span class="fb">✨FOIL</span>':''}</div>
            <div class="cnm">${s?.nm||''}</div>
            <span class="otag" style="background:${getColor(gave?t.to:t.from)}">${gave?'→ '+t.to:'← '+t.from}</span>
          </div>
          <span style="font-size:20px">${gave?'📤':'📥'}</span>
        </div>`;
      }).join('')}
    `:''}
  </div>`;
}

// ── MODAL (sticker ekle) ──
function rModalItems(){
  const mine=S.roomData?.duplicates?.[S.user]||{};
  const q=S.ms.toLowerCase();
  const f=q?ALL.filter(s=>s.id.toLowerCase().includes(q)||s.nm.toLowerCase().includes(q)).slice(0,80):ALL.slice(0,80);
  return f.map(s=>{const qty=mine[s.id]||0;
    return`<div class="mi">
      <span style="font-size:20px;flex-shrink:0">${TF[s.tc]||'🎴'}</span>
      <div class="mii"><div class="miid">${s.id}${s.f?' ✨':''}</div><div class="minm">${s.nm}</div></div>
      <div class="ar">
        ${qty>0?`<button class="qbtn" data-mm="${s.id}">−</button><span class="qv" style="color:#f1f5f9">${qty}</span>`:''}
        <button class="qbtn" style="background:#3b82f6;color:#fff" data-mp="${s.id}">+</button>
      </div>
    </div>`;
  }).join('');
}
function rModal(){
  return`<div class="modal">
    <div class="modh">
      <button class="modx" id="mClose">✕</button>
      <input class="mods" id="mSrch" placeholder="Ara... (TUR14, Arda, BRA...)" value="${S.ms}">
    </div>
    <div class="scroll" id="mList">${rModalItems()}</div>
  </div>`;
}

// ── EVENT HANDLERS ──
function aMarket(){
  document.querySelectorAll('[data-cl]').forEach(b=>{b.onclick=()=>{
    const sid=b.dataset.cl,owner=b.dataset.ow,u=S.user;
    mut(d=>{
      const key=sid+'::'+owner;
      const prev=d.claims?.[key]||[];
      if(!d.claims)d.claims={};
      d.claims[key]=prev.includes(u)?prev.filter(x=>x!==u):[...prev,u];
      return d;
    });
    const ml=g('mktL');if(ml){ml.innerHTML=rMarketList();aMarket();}
  };});
}
function aModalItems(){
  document.querySelectorAll('[data-mp]').forEach(b=>{b.onclick=()=>{
    const sid=b.dataset.mp,u=S.user;
    mut(d=>{
      if(!d.duplicates)d.duplicates={};
      if(!d.duplicates[u])d.duplicates[u]={};
      d.duplicates[u][sid]=(d.duplicates[u][sid]||0)+1;
      return d;
    });
    const ml=g('mList');if(ml){ml.innerHTML=rModalItems();aModalItems();}
  };});
  document.querySelectorAll('[data-mm]').forEach(b=>{b.onclick=()=>{
    const sid=b.dataset.mm,u=S.user;
    mut(d=>{
      if(!d.duplicates?.[u])return d;
      const nq=(d.duplicates[u][sid]||1)-1;
      if(nq<=0){
        delete d.duplicates[u][sid];
        if(d.claims&&d.claims[sid+'::'+u])delete d.claims[sid+'::'+u];
      } else {
        d.duplicates[u][sid]=nq;
      }
      return d;
    });
    const ml=g('mList');if(ml){ml.innerHTML=rModalItems();aModalItems();}
  };});
}
function aApp(){
  const roomLink=location.origin+location.pathname+'?room='+S.roomId;

  g('outBtn')&&(g('outBtn').onclick=()=>{
    if(confirm('Odadan çıkmak istiyor musun?')){
      localStorage.removeItem('takas_user_'+S.roomId);
      if(roomUnsub)roomUnsub();
      S.user=null;S.screen='landing';S.roomId=null;S.roomData=null;
      history.pushState({},'',location.pathname);render();
    }
  });

  g('shareBtn')&&(g('shareBtn').onclick=()=>{
    if(navigator.share){
      navigator.share({title:'Takas Odası',text:(S.roomData?.name||'Takas')+' — katıl!',url:roomLink});
    } else {
      navigator.clipboard.writeText(roomLink).then(()=>showToast('📋 Oda linki kopyalandı!'));
    }
  });

  g('codeBtn')&&(g('codeBtn').onclick=()=>{
    navigator.clipboard.writeText(roomLink).then(()=>showToast('📋 Link kopyalandı!'));
  });

  document.querySelectorAll('[data-tab]').forEach(b=>{b.onclick=()=>{
    S.tab=b.dataset.tab;S.srch='';S.tf='ALL';render();
  };});

  // Pazar arama
  g('srchI')&&(g('srchI').oninput=e=>{
    S.srch=e.target.value;
    const ml=g('mktL');if(ml){ml.innerHTML=rMarketList();aMarket();}
  });
  document.querySelectorAll('[data-tf]').forEach(b=>{b.onclick=()=>{
    S.tf=b.dataset.tf;
    const ml=g('mktL');if(ml){ml.innerHTML=rMarketList();aMarket();}
  };});
  aMarket();

  // Fazlalık +/-
  g('addBtn')&&(g('addBtn').onclick=()=>{S.modal=true;S.ms='';render();setTimeout(()=>g('mSrch')&&g('mSrch').focus(),80);});
  document.querySelectorAll('[data-qm]').forEach(b=>{b.onclick=()=>{
    const sid=b.dataset.qm,u=S.user;
    mut(d=>{
      if(!d.duplicates?.[u])return d;
      const nq=(d.duplicates[u][sid]||1)-1;
      if(nq<=0){
        delete d.duplicates[u][sid];
        if(d.claims&&d.claims[sid+'::'+u])delete d.claims[sid+'::'+u];
      } else {d.duplicates[u][sid]=nq;}
      return d;
    });
    render();
  };});
  document.querySelectorAll('[data-qp]').forEach(b=>{b.onclick=()=>{
    const sid=b.dataset.qp,u=S.user;
    mut(d=>{
      if(!d.duplicates)d.duplicates={};
      if(!d.duplicates[u])d.duplicates[u]={};
      d.duplicates[u][sid]=(d.duplicates[u][sid]||0)+1;
      return d;
    });
    render();
  };});

  // Talepler — Gönder butonu
  // Verici "Gönder ✓" basar → trade oluşur, status:'sent'
  document.querySelectorAll('[data-send-sid]').forEach(b=>{b.onclick=()=>{
    const sid=b.dataset.sendSid,to=b.dataset.sendTo,u=S.user;
    mut(d=>{
      // Fazlalıktan düş
      if(d.duplicates?.[u]?.[sid]){
        const nq=d.duplicates[u][sid]-1;
        if(nq<=0){
          delete d.duplicates[u][sid];
        } else {
          d.duplicates[u][sid]=nq;
        }
      }
      // Talebi kaldır
      const clKey=sid+'::'+u;
      if(d.claims?.[clKey]){
        d.claims[clKey]=d.claims[clKey].filter(x=>x!==to);
        if(d.claims[clKey].length===0)delete d.claims[clKey];
      }
      // Trade oluştur
      if(!d.trades)d.trades={};
      const tradeId='t'+Date.now();
      d.trades[tradeId]={sid,from:u,to,status:'sent',sentAt:Date.now()};
      return d;
    });
    showToast('📤 Gönderildi! '+to+' onaylamasını bekle.');
    render();
  };});

  // Takaslar — Teslim Aldım butonu
  // Alıcı "Teslim Aldım ✓" basar → status:'done'
  document.querySelectorAll('[data-confirm]').forEach(b=>{b.onclick=()=>{
    const tradeId=b.dataset.confirm,u=S.user;
    mut(d=>{
      if(!d.trades?.[tradeId])return d;
      d.trades[tradeId].status='done';
      d.trades[tradeId].doneAt=Date.now();
      // received sayacı artır
      if(!d.received)d.received={};
      d.received[u]=(d.received[u]||0)+1;
      return d;
    });
    showToast('✅ Takas tamamlandı!');
    render();
  };});

  // Modal
  g('mClose')&&(g('mClose').onclick=()=>{S.modal=false;S.ms='';render();});
  g('mSrch')&&(g('mSrch').oninput=e=>{
    S.ms=e.target.value;
    const ml=g('mList');if(ml){ml.innerHTML=rModalItems();aModalItems();}
  });
  aModalItems();
}

init();
</script>
